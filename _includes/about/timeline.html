<div class="timeline">
  {% for item in site.data.timeline %}
    <div class="timeline-item">
      <div class="when">{{ item.from }} to {{ item.to }}</div>
      <div class="content">
        <h3>{{ item.title }}</h3>
        <p>{{ item.description }}</p>
      </div>
    </div>
  {% endfor %}
</div>
