{%- assign resume_url = site.resume_url -%}
<header class="site-nav">
  <div class="nav-inner">

    <a class="brand" href="{{ '/' | relative_url }}">
      {{ site.author.name }}<span>.</span>
      <small>Senior Game Designer · Combat</small>
    </a>

    <button class="nav-toggle" id="nav-toggle" type="button" aria-label="Toggle menu" aria-expanded="false" aria-controls="nav-links">
      <span></span>
    </button>

    <nav class="links" id="nav-links" aria-label="Primary">
      <a href="{{ '/projects/' | relative_url }}" {% if page.url contains '/projects' %}class="active" aria-current="page"{% endif %}>Work</a>
      <a href="{{ '/blog/' | relative_url }}" {% if page.url contains '/blog' %}class="active" aria-current="page"{% endif %}>Writing</a>
      <a href="{{ '/about/' | relative_url }}" {% if page.url contains '/about' %}class="active" aria-current="page"{% endif %}>About</a>
      <a class="cta" href="{{ resume_url }}" target="_blank" rel="noopener noreferrer">Résumé <span aria-hidden="true">↗</span></a>
    </nav>

  </div>
</header>
