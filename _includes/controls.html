<div class="site-controls" id="site-controls">
  <button class="ctrl-btn ctrl-knight" id="knight-toggle" type="button" data-no-avatar aria-label="Toggle the knight on or off">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 2.5 L13 6 L12 13.5 L11 6 Z"/>
      <path d="M8.5 13.5 L15.5 13.5"/>
      <path d="M12 13.5 L12 19"/>
      <path d="M10.4 19.2 L13.6 19.2"/>
    </svg>
  </button>
</div>
<script>
(function () {
  var root = document.documentElement;
  var tb = document.getElementById('theme-toggle');
  var kb = document.getElementById('knight-toggle');
  if (tb) tb.addEventListener('click', function () {
    var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try { localStorage.setItem('theme', next); } catch (e) {}
  });
  if (kb) kb.addEventListener('click', function () {
    var off = root.classList.toggle('knight-off');
    try { localStorage.setItem('knight', off ? 'off' : 'on'); } catch (e) {}
    if (window.__knightSet) window.__knightSet(!off);
  });
})();
</script>
