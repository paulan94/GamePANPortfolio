<div class="site-controls" id="site-controls">
  <button class="ctrl-btn" id="theme-toggle" type="button" aria-label="Toggle light or dark mode">
    <svg class="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
    <svg class="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  </button>
  <button class="ctrl-btn ctrl-knight" id="knight-toggle" type="button" aria-label="Toggle the knight on or off">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" aria-hidden="true"><path d="M12 3l7 3v5c0 4.4-3 7.6-7 9-4-1.4-7-4.6-7-9V6l7-3z"/></svg>
  </button>
</div>
<script>
(function () {
  var root = document.documentElement;
  var tb = document.getElementById('theme-toggle');
  var kb = document.getElementById('knight-toggle');
  if (tb) tb.addEventListener('click', function () {
    var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try { localStorage.setItem('theme', next); } catch (e) {}
  });
  if (kb) kb.addEventListener('click', function () {
    var off = root.classList.toggle('knight-off');
    try { localStorage.setItem('knight', off ? 'off' : 'on'); } catch (e) {}
    if (window.__knightSet) window.__knightSet(!off);
  });
})();
</script>
