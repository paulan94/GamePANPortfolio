<script>
(function () {
  var root = document.documentElement;
  var tb = document.getElementById('theme-toggle');
  var kb = document.getElementById('knight-toggle');
  if (tb) tb.addEventListener('click', function () {
    var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try { localStorage.setItem('theme', next); } catch (e) {}
  });
  if (kb) kb.addEventListener('click', function () {
    var off = root.classList.toggle('knight-off');
    try { localStorage.setItem('knight', off ? 'off' : 'on'); } catch (e) {}
    if (window.__knightSet) window.__knightSet(!off);
  });
})();
</script>

  <script>
  // Mobile nav toggle
  (function () {
    var btn = document.getElementById('nav-toggle');
    var links = document.getElementById('nav-links');
    if (!btn || !links) return;
    btn.addEventListener('click', function () {
      var open = links.classList.toggle('open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
    links.addEventListener('click', function (e) {
      if (e.target.tagName === 'A') {
        links.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });
  })();
</script>
